name: prek

on:
  push:
    branches: [main]
  pull_request:

jobs:
  prek:
    name: Run prek checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
      - name: Install the project
        run: uv sync --all-extras --dev
      - uses: j178/prek-action@v1
        with:
          extra_args: --all-files
